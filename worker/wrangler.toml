name = "flockblocker-stories"
main = "worker.js"
compatibility_date = "2024-01-01"

# KV namespace bindings — replace IDs after creating them
# wrangler kv namespace create SUBMISSIONS
# wrangler kv namespace create SUBMISSIONS --preview
[[kv_namespaces]]
binding = "SUBMISSIONS"
id = "YOUR_KV_NAMESPACE_ID"
preview_id = "YOUR_PREVIEW_KV_NAMESPACE_ID"

# Set via: wrangler secret put ADMIN_PASSWORD
# [vars]
# ADMIN_PASSWORD is set as a secret, not here
