<style>
  :root {
    --bg: #04040a;
    --surface: #0b0b14;
    --border: #1a1a26;
    --accent: #c8f04a;

  .four-link { font-family: var(--mono); font-size: 0.82rem; color: var(--accent); letter-spacing: 0.04em; border-bottom: 1px solid rgba(200,240,74,0.3); padding-bottom: 2px; transition: all 0.2s; }
  .four-link:hover { color: var(--white); border-color: var(--white); }
  a { color: inherit; text-decoration: none; }

  .four-doctrine { margin-top: 4rem; font-family: var(--mono); font-size: 0.68rem; color: var(--text-dim); letter-spacing: 0.1em; max-width: 380px; line-height: 1.8; }
  .four-doctrine a { color: #f0a84a; font-weight: 700; border-bottom: 1px solid rgba(240,168,74,0.35); transition: color 0.2s; }
  .four-doctrine a:hover { color: var(--accent); }
</style>
